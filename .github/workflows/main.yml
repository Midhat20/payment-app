name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # fixes Node 20 warning

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'   # optional performance boost

      - name: Install dependencies
        run: npm install --legacy-peer-deps   # fixes lucide-react conflict

      - name: Build project
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build   # 👉 change if using Vite (dist) or Next (out)

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
